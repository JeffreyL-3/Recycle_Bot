<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://fonts.cdnfonts.com/css/aquire" rel="stylesheet">
        <link href="https://fonts.cdnfonts.com/css/motiva-sans" rel="stylesheet">
        <link rel="shortcut icon" type="image/x-icon" href="static/favicon.png">
        <link rel="stylesheet" href="static/styles.css">

                    
        <title> Recycle_Bot </title>
    </head>
    <body>

        <div class="top-bar">
            <button type="button" class="hamburger" onclick="toggleNav()" aria-label="Toggle settings">☰</button>
            <div class="model-picker">
                <label class="visually-hidden" for="modelPicker">Model</label>
                <select id="modelPicker" name="model" form="image-form" aria-label="Model">
                    <option value="gpt-4o">4o</option>
                </select>
            </div>
            <button type="button" id="locationButton" onclick="useDeviceLocation()">Use Location</button>
            <span id="topBarStatus" class="top-bar-status" aria-live="polite"></span>
        </div>

        <div class="flex-container">
            <div class="sidebar" id="mySidebar">
                <form action="/" method="post" enctype="multipart/form-data">
                    <input type="text" name="api_key" id="api_key" placeholder="Custom API Key (optional)"><br>
                    <input type="text" name="town" id="town" required placeholder="Town" maxlength="50"><br>
                    <input type="text" name="state" id="state" required placeholder="State" maxlength="30"><br>
                    <input type="text" name="object" id="object" required placeholder="Object" maxlength="30"><br>
                    <input type="text" name="personality" id="personality" placeholder="Personality" maxlength="30"><br>
                </form>
            </div>
        </div>

        <div class="container">
            <h1>Recycle_Bot</h1>

            <form id="image-form" action="/" method="post" enctype="multipart/form-data">
                <div id="choice-screen" class="choice-screen">
                    <button type="button" class="primary-action" onclick="startPhotoFlow()">Take Photo</button>
                    <button type="button" class="primary-action" onclick="startUploadFlow()">Upload Image</button>
                </div>

                <div id="action-screen" class="action-screen" hidden>
                    <button type="button" id="backButton" class="back-button" onclick="resetImageFlow()">Back</button>
                    <p id="flow-instruction" class="flow-instruction"></p>
                    <p id="flow-status" class="flow-status"></p>
                    <video id="camera-preview" autoplay playsinline muted hidden></video>
                    <button type="button" id="capturePhotoButton" class="primary-action" onclick="capturePhoto()" hidden>Capture Photo</button>
                </div>

                <input type="file" name="image" id="image" accept="image/*" required onchange="handleUploadInput()">
                <input type="file" id="camera-image" accept="image/*" capture="environment" onchange="useCameraInput()">
                <canvas id="camera-canvas" hidden></canvas>
            </form>

            <div id="result"></div>
        </div>

        
        <script src="static/script.js"></script>

    </body>
</html>
